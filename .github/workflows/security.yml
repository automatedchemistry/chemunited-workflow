name: Security Analysis

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  package-security:
    name: Dependency and static security scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install package and security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,server]" pip-audit bandit[toml]

      - name: Audit Python dependencies
        run: |
          pip-audit \
            --skip-editable \
            --ignore-vuln PYSEC-2025-183

      - name: Run Bandit
        run: bandit -r chemunited_workflow
